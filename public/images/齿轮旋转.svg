<svg xmlns="http://www.w3.org/2000/svg"
     width="240"
     height="240"
     viewBox="0 0 240 240">

    <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#d6dde8"/>
            <stop offset="100%" stop-color="#7d8fa8"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="3"
                          flood-opacity="0.25"/>
        </filter>

        <!-- 一个齿 -->
        <rect id="tooth"
              x="-5"
              y="-82"
              width="10"
              height="20"
              rx="2"/>
    </defs>

    <!-- 齿轮 -->
    <g transform="translate(120 120)" filter="url(#shadow)">

        <g fill="url(#g)">

            <!-- 12个齿 -->
            <use href="#tooth"/>
            <use href="#tooth" transform="rotate(30)"/>
            <use href="#tooth" transform="rotate(60)"/>
            <use href="#tooth" transform="rotate(90)"/>
            <use href="#tooth" transform="rotate(120)"/>
            <use href="#tooth" transform="rotate(150)"/>
            <use href="#tooth" transform="rotate(180)"/>
            <use href="#tooth" transform="rotate(210)"/>
            <use href="#tooth" transform="rotate(240)"/>
            <use href="#tooth" transform="rotate(270)"/>
            <use href="#tooth" transform="rotate(300)"/>
            <use href="#tooth" transform="rotate(330)"/>

            <!-- 外圆 -->
            <circle r="65"
                    stroke="#5d6d84"
                    stroke-width="5"
                    fill="url(#g)"/>

            <!-- 内圆 -->
            <circle r="24"
                    fill="#eef2f6"
                    stroke="#5d6d84"
                    stroke-width="5"/>

            <!-- 中心 -->
            <circle r="8"
                    fill="#5d6d84"/>
        </g>

        <!-- 动画 -->
        <animateTransform
            attributeName="transform"
            type="rotate"
            additive="sum"
            values="
                0;
                120;
                900;
                1710;
                1800;
                1800"
            keyTimes="
                0;
                0.18;
                0.55;
                0.85;
                0.95;
                1"
            dur="4.5s"
            calcMode="spline"
            keySplines="
                .42 0 1 1;
                0 0 1 1;
                0 0 .58 1;
                .42 0 .58 1;
                0 0 1 1"
            repeatCount="indefinite"/>
    </g>

</svg>